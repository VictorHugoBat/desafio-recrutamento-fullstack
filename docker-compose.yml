version: '3.8'

services:
  
  db:
    image: postgres:13
    container_name: recrutamento_db
    environment:
      POSTGRES_DB: recruitment_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_admin
    ports:
      - "5433:5432"

  
  api:
    build: ./backend/recrutamento-api
    container_name: recrutamento_api
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/recruitment_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin_admin
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  
  web:
    build: ./recrutamento-web
    container_name: recrutamento_web
    ports:
      - "4200:80" 
    depends_on:
      - api